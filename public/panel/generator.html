<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel de productos</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#111827;
padding:25px;
border-radius:10px;
margin-bottom:25px;
border:1px solid #1f2937;
}

input,select,textarea{

width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #374151;
background:#020617;
color:white;

}

textarea{
height:80px;
}

button{

padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;

}

.add{
background:#2563eb;
color:white;
}

.send{
background:#22c55e;
color:white;
margin-top:20px;
}

.product{
background:#020617;
padding:20px;
border-radius:8px;
border:1px solid #1f2937;
margin-bottom:20px;
}

</style>

</head>


<body>

<div class="container">

<h1>Panel de Productos</h1>

<div class="card">

<h2>Productos</h2>

<div id="products"></div>

<button class="add" onclick="addProduct()">Agregar producto</button>

</div>

<button class="send" onclick="sendJSON()">Enviar a WhatsApp</button>

</div>



<script>

let productCount = 0


function addProduct(){

productCount++

const container = document.getElementById("products")

const div = document.createElement("div")

div.className = "product"

div.innerHTML = `

<h3>Producto ${productCount}</h3>

<input class="name" placeholder="Nombre producto">

<input class="price" type="number" placeholder="Precio">

<select class="category">
<option>sudaderas</option>
<option>gorras</option>
<option>playeras</option>
<option>tenis</option>
<option>perfumes</option>
<option>spa</option>
<option>otros</option>
</select>

<input class="stock" type="number" placeholder="Stock">

<label>Imagen</label>
<input type="file" class="image">

<textarea class="description" placeholder="Descripción"></textarea>

`

container.appendChild(div)

}



function sendJSON(){

const products = []

document.querySelectorAll(".product").forEach((p,i)=>{

const imageFile = p.querySelector(".image").files[0]

products.push({

name: p.querySelector(".name").value,

price: Number(p.querySelector(".price").value),

category: p.querySelector(".category").value,

stock: Number(p.querySelector(".stock").value),

image: imageFile ? imageFile.name : "",

description: p.querySelector(".description").value,

featured: true,

active: true

})

})

const json = JSON.stringify(products,null,2)

const numeroAdmin = "524491234567"

const mensaje = encodeURIComponent(json)

window.location.href = `https://wa.me/${numeroAdmin}?text=${mensaje}`

}

</script>

</body>
</html>
