<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Mercadia</title>

<style>

body{
font-family:system-ui, -apple-system, sans-serif;
background:#0f172a;
color:#e5e7eb;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
font-size:32px;
margin-bottom:30px;
}

.card{
background:#111827;
padding:25px;
border-radius:10px;
margin-bottom:25px;
border:1px solid #1f2937;
}

.card h2{
margin-top:0;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input, select, textarea{

width:100%;
padding:10px;
border-radius:6px;
border:1px solid #374151;
background:#020617;
color:white;

}

textarea{
min-height:70px;
}

.product{
background:#020617;
border:1px solid #1f2937;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

button{

padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;

}

.btn-add{
background:#2563eb;
color:white;
}

.btn-send{
background:#22c55e;
color:white;
margin-top:20px;
}

.btn-add:hover{
background:#1d4ed8;
}

.btn-send:hover{
background:#16a34a;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>


<body>

<div class="container">

<h1>Panel de Tienda</h1>

<div class="card">

<h2>Datos de la tienda</h2>

<div class="grid">

<input id="store_id" placeholder="store_id">

<input id="store_name" placeholder="Nombre tienda">

<input id="store_whatsapp" placeholder="WhatsApp negocio">

<input type="file" id="store_logo">

</div>

</div>


<div class="card">

<h2>Productos</h2>

<div id="products"></div>

<button class="btn-add" onclick="addProduct()">Agregar producto</button>

</div>


<button class="btn-send" onclick="sendJSON()">Enviar a WhatsApp</button>

</div>



<script>

let productCount = 0


function addProduct(){

productCount++

const container = document.getElementById("products")

const div = document.createElement("div")
div.className = "product"

div.innerHTML = `

<h3>Producto ${productCount}</h3>

<div class="grid">

<input class="name" placeholder="Nombre producto">

<input class="price" type="number" placeholder="Precio">

<select class="category">
<option>sudaderas</option>
<option>gorras</option>
<option>playeras</option>
<option>tenis</option>
<option>perfumes</option>
<option>spa</option>
<option>otros</option>
</select>

<input class="stock" type="number" placeholder="Stock">

<input type="file" class="image">

<textarea class="description" placeholder="Descripción"></textarea>

<label>
<input type="checkbox" class="featured">
Producto destacado
</label>

</div>

`

container.appendChild(div)

}



function sendJSON(){

const logoFile = document.getElementById("store_logo").files[0]

const store = {

id: document.getElementById("store_id").value,
name: document.getElementById("store_name").value,
whatsapp: document.getElementById("store_whatsapp").value,
currency:"MXN",
logo: logoFile ? "/assets/logos/"+logoFile.name : "",
active:true

}


const products = []


document.querySelectorAll(".product").forEach((p,i)=>{

const imageFile = p.querySelector(".image").files[0]

products.push({

id: Date.now()+i,

store: store.id,

name: p.querySelector(".name").value,

price: Number(p.querySelector(".price").value),

category: p.querySelector(".category").value,

stock: Number(p.querySelector(".stock").value),

image: imageFile ? "/assets/products/"+store.id+"/"+imageFile.name : "",

description: p.querySelector(".description").value,

featured: p.querySelector(".featured").checked,

active:true

})

})


const data = {

stores:[store],
products:products

}


const json = JSON.stringify(data,null,2)


const numeroAdmin = "524491234567"

const mensaje = encodeURIComponent(json)

window.open(`https://wa.me/${numeroAdmin}?text=${mensaje}`)

}

</script>

</body>
</html>
