<!DOCTYPE html>
<html lang="es">

<head>

<meta http-equiv="Content-Security-Policy"
content="script-src 'self' https://www.gstatic.com https://www.googleapis.com; connect-src *; img-src * data:; style-src 'self' 'unsafe-inline';">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda</title>

<link rel="stylesheet" href="assets/css/core.css">
<link rel="stylesheet" href="assets/css/themes.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

/* HEADER */

header{

position:sticky;
top:0;
z-index:9999;

display:flex;
justify-content:space-between;
align-items:center;

padding:15px 20px;

background:var(--primary);
color:white;

box-shadow:0 4px 20px rgba(0,0,0,0.15);

transition:all .25s ease;

}

.store-header{
display:flex;
align-items:center;
gap:10px;
}

#store-logo{
height:40px;
}

.cart-icon{
cursor:pointer;
font-size:18px;
transition:transform .2s ease;
}

.cart-icon:hover{
transform:scale(1.1);
}


/* HERO */

.hero{
background:#111;
color:white;
padding:80px 20px;
text-align:center;
background-size:cover;
background-position:center;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
opacity:.8;
}


/* BUSCADOR GLASS */

.search-container{

background: rgba(255,255,255,0.18);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);

padding:20px;
border-radius:12px;

max-width:900px;
margin:25px auto;

box-shadow:0 8px 30px rgba(0,0,0,0.15);

}

#search-input{

width:100%;
padding:14px 16px;

border:none;
border-radius:8px;

background: rgba(255,255,255,0.35);
color:#000;

font-size:16px;
outline:none;

}

#search-input::placeholder{
color:#444;
}

.search-box{
display:flex;
gap:10px;
}

.search-box input{
flex:1;
}

.search-box button{

padding:14px 18px;

border:none;
border-radius:8px;

background:var(--primary);
color:white;

font-weight:600;
cursor:pointer;

}

/* CATEGORIAS */

.home-categories{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(160px,1fr));

gap:20px;

padding:40px 20px;

max-width:1200px;

margin:auto;

}

.category-card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.05);
cursor:pointer;
min-width:160px;
text-align:center;
transition:transform .2s ease;
}

.category-card:hover{
transform:translateY(-4px);
}


/* DESTACADOS */

.featured{
padding:40px 20px;
}

.featured h2{
text-align:center;
margin-bottom:20px;
}


/* RESPONSIVE */

@media(max-width:768px){

.hero h1{
font-size:28px;
}

.products-grid{
grid-template-columns:1fr 1fr;
}

}

/* CATEGORIAS MOVIL DESLIZABLES */

@media (max-width:600px){

.home-categories{

display:flex;

overflow-x:auto;

overflow-y:hidden;

gap:16px;

padding:20px;

flex-wrap:nowrap;

scroll-snap-type:x mandatory;

}

.category-card{

flex:0 0 48%;

min-width:48%;

scroll-snap-align:start;

}

.home-categories::-webkit-scrollbar{
display:none;
}

}

.product-card{
padding:12px;
}

.product-card img{
height:140px;
}

.product-card h3{
font-size:14px;
margin:6px 0;
}

.product-card p{
font-size:15px;
margin-bottom:8px;
}

.product-card button{
padding:8px 10px;
font-size:13px;
}
</style>


</head>

<body>

<header>

<div class="store-title" id="store-name">
Tienda
</div>

<div class="cart-icon" id="cart-button">
🛒 (<span id="cart-count">0</span>)
</div>

</header>

<!-- HERO -->

<section class="hero" id="hero">

<h1>Bienvenido</h1>

<p>Explora nuestros productos</p>

<div class="search-container">

<div class="search-box">

<input
type="text"
id="search-input"
placeholder="Buscar productos..."
>

<button id="search-btn">
Buscar
</button>

</div>

</div>

</section>

<!-- CATEGORIAS -->

<section class="home-categories" id="categories"></section>

<!-- DESTACADOS -->

<section class="featured">

<h2>Productos Destacados</h2>

<div class="products-grid" id="featured-products"></div>

</section>

<!-- PRODUCTOS -->

<section>

<div class="products-grid" id="products"></div>

</section>

<!-- CARRITO -->

<!-- CARRITO -->

<div class="cart-panel" id="cart-panel">

<div style="display:flex;justify-content:space-between;align-items:center">

<h2>Carrito</h2>

<button id="close-cart-button" style="
background:none;
border:none;
font-size:22px;
cursor:pointer;
">
✕
</button>

</div>

<div id="cart-items"></div>

<h3>Total: <span id="cart-total">$0</span></h3>

<button id="checkout-btn">
Comprar por WhatsApp
</button>

</div>


<!-- CHATBOT -->

<div id="chatbot-button" class="chatbot">
💬
</div>

<div id="chatbot-box" class="chatbot-box" style="display:none"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/search.js"></script>
<script src="js/chatbot.js"></script>
<script src="js/ui.js"></script>

<script type="module" src="/firebase/firebase-config.js"></script>
</body>
</html>
