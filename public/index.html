<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda</title>

<link rel="stylesheet" href="assets/css/core.css">
<link rel="stylesheet" href="assets/css/themes.css">

<style>

/* HERO */

.hero{
background:#111;
color:white;
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
opacity:.8;
}

/* CATEGORIAS HOME */

.home-categories{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
padding:40px 20px;
}

.category-card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.05);
cursor:pointer;
min-width:160px;
text-align:center;
}

/* DESTACADOS */

.featured{
padding:40px 20px;
}

.featured h2{
text-align:center;
margin-bottom:20px;
}

/* RESPONSIVE */

@media(max-width:768px){

.hero h1{
font-size:28px;
}

.products-grid{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<header>

<div class="logo" id="store-name">
Tienda
</div>

<div class="cart-icon" onclick="toggleCart()">
🛒 (<span id="cart-count">0</span>)
</div>

</header>

<!-- HERO -->

<section class="hero">

<h1>Bienvenido</h1>

<p>Explora nuestros productos</p>

<div class="search-container">

<input
type="text"
id="search-input"
placeholder="Buscar productos..."
onkeyup="searchProducts()"
/>

</div>

</section>

<!-- CATEGORIAS HOME -->

<section class="home-categories" id="categories"></section>

<!-- DESTACADOS -->

<section class="featured">

<h2>Productos Destacados</h2>

<div class="products-grid" id="featured-products"></div>

</section>

<!-- PRODUCTOS -->

<section>

<h2 style="text-align:center;margin-top:20px;">Todos los productos</h2>

<div class="products-grid" id="products"></div>

</section>

<!-- CARRITO -->

<div class="cart-panel" id="cart-panel">

<div style="display:flex;justify-content:space-between;align-items:center">

<h2>Carrito</h2>

<button onclick="toggleCart()" style="
background:none;
border:none;
font-size:22px;
cursor:pointer;
">
✕
</button>

</div>

<div id="cart-items"></div>

<h3>Total: <span id="cart-total">$0</span></h3>

<button onclick="checkoutWhatsApp()">
Comprar por WhatsApp
</button>

</div>

<!-- CHATBOT -->

<div id="chatbot-button" class="chatbot" onclick="toggleBot()">
💬
</div>

<div id="chatbot-box" class="chatbot-box">

<p>¿Qué buscas?</p>

<button onclick="botCategoria()">Ver categorías</button>

<button onclick="botComprar()">Ver productos</button>

<button onclick="botWhats()">Comprar</button>

</div>

<script>

/* CONTROL PLAN */

const PLAN_PRO = false;

if(!PLAN_PRO){
document.getElementById("chatbot-button").style.display="none";
}

/* CARRITO */

function toggleCart() {

const cart = document.getElementById("cart-panel");

if (cart.style.display === "block") {
cart.style.display = "none";
} else {
cart.style.display = "block";
renderCart();
}

}


/* cerrar carrito al hacer click fuera */

document.addEventListener("click", function(e){

const cart = document.getElementById("cart-panel");
const cartButton = document.querySelector('[onclick="toggleCart()"]');

if(
cart.style.display === "block" &&
!cart.contains(e.target) &&
!cartButton.contains(e.target)
){
cart.style.display = "none";
}

});
/* BOT */

function toggleBot(){

const box = document.getElementById("chatbot-box");

box.style.display =
box.style.display === "block" ? "none" : "block";

}

function botCategoria(){

document.getElementById("categories")
.scrollIntoView({behavior:"smooth"});

}

function botComprar(){

document.getElementById("products")
.scrollIntoView({behavior:"smooth"});

}

function botWhats(){

checkoutWhatsApp();

}

</script>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/search.js"></script>

</body>

</html>
